name: CI/CD Build & Test Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: nethmini
          MYSQL_DATABASE: project_management
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Generate Prisma Client
      run: |
        cd backend
        npx prisma generate

    - name: Run Database Migrations
      run: |
        cd backend
        npx prisma migrate deploy
      env:
        DATABASE_URL: mysql://root:nethmini@127.0.0.1:3306/project_management

    - name: Run Backend Integration Tests
      run: |
        cd backend
        npm run test
      env:
        DATABASE_URL: mysql://root:nethmini@127.0.0.1:3306/project_management
        JWT_SECRET: myProjectManagementSecret123

  frontend-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Run Frontend Lint Checks
      run: |
        cd frontend
        npm run lint

    - name: Compile Frontend Production Build
      run: |
        cd frontend
        npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
